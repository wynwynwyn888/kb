# Deploy Nest + Next + Redis to Hostinger KVM (Docker) via SSH.
# Replaces hostinger/deploy-on-vps@v2 which reported success but did not
# reliably pull code or rebuild containers on the VPS.
#
# Prerequisites (one-time VPS setup):
#   1. GitHub Actions deploy key added to VPS ~/.ssh/authorized_keys (Key Pair A)
#   2. GitHub repo deploy key added to VPS ~/.ssh/kb_github_deploy (Key Pair B)
#   3. VPS git remote set to git@github.com:wynwynwyn888/kb.git
#   4. VPS SSH config uses kb_github_deploy for github.com
#   5. .env.production present at /root/aisbp/.env.production
#
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT

name: Deploy Hostinger VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-and-build:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /root/aisbp

            echo "=== PULLING LATEST MAIN ==="
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== VERIFY COMMIT ==="
            VPS_COMMIT=$(git rev-parse HEAD)
            echo "VPS commit: $VPS_COMMIT"
            echo "Pushed commit: ${{ github.sha }}"

            if [ "$VPS_COMMIT" != "${{ github.sha }}" ]; then
              echo "ERROR: VPS commit ($VPS_COMMIT) does not match pushed commit (${{ github.sha }})"
              exit 1
            fi
            echo "OK: VPS is running the pushed commit"

            echo "=== BUILD AND DEPLOY BACKEND ==="
            docker compose -f docker-compose.hostinger.yml --env-file .env.production up -d --build backend

            echo "=== BUILD AND DEPLOY FRONTEND ==="
            docker compose -f docker-compose.hostinger.yml --env-file .env.production up -d --build frontend

            echo "=== HEALTH CHECK ==="
            docker ps --filter name=aisbp --format 'table {{.Names}}\t{{.Status}}'
            sleep 5
            docker logs aisbp-backend-1 --tail 3
