name: Seed AISBP Agency Vault

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'seed | test-retrieval'
        required: true
        default: 'seed'
        type: choice
        options:
          - seed
          - test-retrieval
          - inspect
          - bot-test

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /root/aisbp
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            CONTAINER=$(docker ps -qf name=aisbp-backend)

            if [ "${{ github.event.inputs.mode }}" = "inspect" ]; then
              echo "=== RUNNING PROFILE + VAULT INSPECTION ==="
              docker exec $CONTAINER node -e "
                const { createClient } = require('@supabase/supabase-js');
                const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY, { auth: { autoRefreshToken: false, persistSession: false } });
                const TID = '34c62859-95b1-49a8-911c-cc44ced05452';
                const VID = 'b26f2661-23e9-4689-b2c9-9010735ddaee';
                (async () => {
                  const { data: prof } = await supabase.from('tenant_bot_profiles')
                    .select('name, persona, conversation_goals, business_notes, booking_behavior_notes, escalation_behavior_notes, tone_rules, knowledge_scope_notes, critical_facts, knowledge_access_mode, updated_at')
                    .eq('tenant_id', TID).eq('is_active', true).maybeSingle();
                  if (!prof) { console.log('NO ACTIVE PROFILE'); return; }
                  console.log('=== ACTIVE PROFILE ===');
                  console.log('Name:', prof.name);
                  console.log('Updated:', prof.updated_at);
                  console.log('knowledge_access_mode:', prof.knowledge_access_mode);
                  console.log('');
                  const fields = [
                    ['Critical Facts', prof.critical_facts],
                    ['Persona', prof.persona],
                    ['Conversation Goals', prof.conversation_goals],
                    ['Business Notes', prof.business_notes],
                    ['Booking Behavior', prof.booking_behavior_notes],
                    ['Escalation Behavior', prof.escalation_behavior_notes],
                    ['Tone Rules', prof.tone_rules],
                    ['Knowledge Scope', prof.knowledge_scope_notes],
                  ];
                  console.log('--- Field character counts ---');
                  for (const [label, val] of fields) {
                    const v = String(val ?? '');
                    const warn = (label === 'Critical Facts' && v.length > 1500) || (label === 'Persona' && v.length > 1500) || (label === 'Conversation Goals' && v.length > 5000) || (label === 'Business Notes' && v.length > 5000) || (label === 'Booking Behavior' && v.length > 1000) || (label === 'Escalation Behavior' && v.length > 1000) || (label === 'Tone Rules' && v.length > 1000) || (label === 'Knowledge Scope' && v.length > 500) ? ' ⚠️ OVER CAP' : '';
                    console.log(label + ': ' + v.length + ' chars' + warn);
                  }

                  console.log('');
                  console.log('=== VAULT STATUS ===');
                  const { data: docs } = await supabase.from('knowledge_documents')
                    .select('source, status').eq('tenant_id', TID).eq('vault_id', VID);
                  if (!docs) { console.log('NO DOCS in vault'); return; }
                  const faqReady = docs.filter(d => d.source === 'faq' && d.status === 'READY').length;
                  const noteReady = docs.filter(d => d.source === 'rich_text' && d.status === 'READY').length;
                  console.log('Vault ID:', VID);
                  console.log('FAQs READY:', faqReady, '/ 10');
                  console.log('Notes READY:', noteReady, '/ 7');

                  console.log('');
                  console.log('=== RETRIEVAL QUICK TEST ===');
                  for (const q of ['price', 'staff replying', 'ChatGPT', 'ROI', 'AI Automation Session', 'auto-reply']) {
                    const dc = await supabase.from('knowledge_documents').select('id, title, source').eq('tenant_id', TID).eq('vault_id', VID).eq('status', 'READY').order('updated_at', { ascending: false }).limit(200);
                    if (!dc.data?.length) { console.log(q + ': NO DOCS'); continue; }
                    const ids = dc.data.map(d => d.id);
                    const map = new Map(dc.data.map(d => [d.id, d]));
                    const rc = await supabase.from('knowledge_chunks').select('id, document_id, content, metadata').in('document_id', ids).limit(3000);
                    if (!rc.data?.length) { console.log(q + ': NO CHUNKS'); continue; }
                    const chunks = rc.data.map(r => ({ id: r.id, documentId: r.document_id, title: (map.get(r.document_id)?.title ?? '').slice(0, 80), source: map.get(r.document_id)?.source ?? '?', content: r.content, metadata: r.metadata ?? {} }));

                    // Simple substring scoring (same logic as rankChunksByRelevance)
                    const ql = q.toLowerCase();
                    const scored = chunks.map(c => {
                      let s = 0;
                      const cn = c.content.toLowerCase().replace(/[^\w]+/g, '');
                      const tn = c.title.toLowerCase().replace(/[^\w]+/g, '');
                      const sn = String(c.metadata['sectionTitle'] || '').toLowerCase().replace(/[^\w]+/g, '');
                      for (const tok of ql.split(/\s+/).filter(t => t.length >= 2)) {
                        if (cn.includes(tok)) s += Math.min(12, tok.length);
                        if (tn.includes(tok)) s += Math.min(12, tok.length) * 1.15;
                        if (sn.includes(tok)) s += Math.min(12, tok.length) * 1.85;
                      }
                      if (ql.length >= 3 && cn.includes(ql)) s += 2.4;
                      if (ql.length >= 3 && tn.includes(ql)) s += 2.8;
                      if (ql.length >= 3 && sn.includes(ql)) s += 8.0;
                      return { chunk: c, score: s };
                    }).filter(r => r.score > 0).sort((a, b) => b.score - a.score);
                    if (!scored.length) { console.log(q + ': NONE'); continue; }
                    const top = scored[0];
                    const sec = top.chunk.metadata['sectionTitle'] || '(no section)';
                    console.log(q + ' → score=' + top.score.toFixed(1) + ' ' + top.chunk.source + ' \"' + top.chunk.title.slice(0, 50) + '\" [' + String(sec).slice(0, 35) + ']');
                  }
                  console.log('');
                  console.log('DONE');
                })().catch(e => { console.error('ERROR', e.message); process.exit(1); });
              "
            elif [ "${{ github.event.inputs.mode }}" = "bot-test" ]; then
              echo "=== RUNNING BOT TEST MESSAGES ==="
              docker exec $CONTAINER node -e "
                const jwt = require('jsonwebtoken');
                const http = require('http');

                const SECRET = process.env.JWT_SECRET;
                if (!SECRET) { console.error('JWT_SECRET missing'); process.exit(1); }
                const token = jwt.sign({ sub: 'system-bot-test', agencyRole: 'admin' }, SECRET, { expiresIn: '5m' });
                const TID = '34c62859-95b1-49a8-911c-cc44ced05452';

                const messages = [
                  'How much does it cost?',
                  'I already have staff replying to WhatsApp, why do I need this?',
                  'Can I just use ChatGPT?',
                  'What ROI can I expect?',
                  'What is the AI Automation Session?',
                  'Thank you for contacting ABC Clinic. Please provide your name and preferred appointment date.',
                ];

                async function send(msg, idx) {
                  return new Promise((resolve, reject) => {
                    const body = JSON.stringify({ message: msg, history: [] });
                    const req = http.request({
                      hostname: 'localhost', port: 3001,
                      path: '/api/v1/tenants/' + TID + '/bot-test',
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token,
                        'Content-Length': Buffer.byteLength(body),
                      },
                      timeout: 45000,
                    }, (res) => {
                      let data = '';
                      res.on('data', c => data += c);
                      res.on('end', () => {
                        try {
                          const j = JSON.parse(data);
                          const reply = (j.reply || '').trim();
                          const preview = reply.length > 200 ? reply.slice(0, 200) + '...' : reply;
                          const chunks = j.kbChunksUsed || 0;
                          console.log('');
                          console.log('=== Message ' + (idx+1) + ' ===');
                          console.log('User: ' + msg);
                          console.log('Reply: ' + preview);
                          console.log('KB chunks used: ' + chunks);
                          console.log('Model: ' + (j.modelUsed || '?'));
                          console.log('Skip reason: ' + (j.skipReason || 'none'));
                          resolve({ reply, chunks, msg });
                        } catch(e) { reject(e); }
                      });
                    });
                    req.on('error', e => reject(e));
                    req.on('timeout', () => { req.destroy(); reject(new Error('timeout')); });
                    req.write(body);
                    req.end();
                  });
                }

                (async () => {
                  console.log('Tenant: ' + TID);
                  console.log('Auth: JWT generated');
                  const results = [];
                  for (let i = 0; i < messages.length; i++) {
                    try {
                      results.push(await send(messages[i], i));
                    } catch(e) {
                      console.log('');
                      console.log('=== Message ' + (i+1) + ' ===');
                      console.log('User: ' + messages[i]);
                      console.log('ERROR: ' + e.message);
                    }
                    // short pause between messages
                    await new Promise(r => setTimeout(r, 2000));
                  }
                  console.log('');
                  console.log('BOT TEST COMPLETE. ' + results.length + '/' + messages.length + ' messages processed.');
                })().catch(e => { console.error('FATAL', e.message); process.exit(1); });
              "
            elif [ "${{ github.event.inputs.mode }}" = "test-retrieval" ]; then
              echo "=== COPYING RETRIEVAL TEST SCRIPT ==="
              cat > /tmp/test-retrieval.ts << 'SCRIPT_EOF'
            import { createClient } from '@supabase/supabase-js';
            import { rankChunksByRelevance } from './src/lib/kb-retrieval-score';

            const TID = '34c62859-95b1-49a8-911c-cc44ced05452';
            const VID = 'b26f2661-23e9-4689-b2c9-9010735ddaee';
            const TOP = 5;

            const supabase = createClient(process.env.SUPABASE_URL!, process.env.SUPABASE_SERVICE_ROLE_KEY!, { auth: { autoRefreshToken: false, persistSession: false } });

            async function load() {
              const { data: docs } = await supabase.from('knowledge_documents').select('id, title, source').eq('tenant_id', TID).eq('vault_id', VID).eq('status', 'READY').order('updated_at', { ascending: false }).limit(200);
              if (!docs?.length) return [];
              const map = new Map(docs.map(d => [d.id, d]));
              const { data: rows } = await supabase.from('knowledge_chunks').select('id, document_id, content, metadata').in('document_id', [...map.keys()]).limit(3000);
              if (!rows?.length) return [];
              return rows.map(r => { const d = map.get(r.document_id); return { id: r.id, documentId: r.document_id, title: (d?.title ?? r.document_id).slice(0, 200), source: d?.source ?? '?', content: r.content, metadata: (r.metadata ?? {}) }; });
            }

            async function test(q: string) {
              console.log('\nQUERY: "' + q + '"');
              const chunks = await load();
              if (!chunks.length) { console.log('  NO CHUNKS'); return; }
              const ranked = rankChunksByRelevance(q, chunks);
              if (!ranked.length) { console.log('  NONE (all scored 0)'); return; }
              for (let i = 0; i < Math.min(ranked.length, TOP); i++) {
                const c = ranked[i].chunk;
                const s = c.metadata['sectionTitle'] || '(no section)';
                const p = c.content.slice(0, 100).replace(/\n/g, ' ');
                console.log('  #'+(i+1)+' score='+ranked[i].score.toFixed(1)+' src='+c.source+' doc="'+c.title.slice(0,60)+'"');
                console.log('     section="'+String(s).slice(0,50)+'" preview: '+p+'...');
              }
            }

            (async () => {
              console.log('Tenant: '+TID+'\nVault: '+VID+'\nTop K: '+TOP);
              for (const q of ['How much does it cost?','I already have staff replying to WhatsApp','Can I just use ChatGPT?','What ROI can I expect?','What is the AI Automation Session?','Thank you for contacting ABC Clinic. Please provide your name and preferred appointment date.']) await test(q);
              console.log('\nDONE.');
            })().catch(e => { console.error('ERROR', e); process.exit(1); });
            SCRIPT_EOF
              docker cp /tmp/test-retrieval.ts $CONTAINER:/app/apps/backend/test-retrieval.ts
              echo "=== RUNNING RETRIEVAL TESTS ==="
              docker exec $CONTAINER npx tsx test-retrieval.ts
              rm /tmp/test-retrieval.ts
            else
              echo "=== COPYING SEED SCRIPT INTO CONTAINER ==="
              docker cp apps/backend/scripts/seed-aisbp-vault.ts $CONTAINER:/app/apps/backend/scripts/seed-aisbp-vault.ts
              echo "=== RUNNING AISBP VAULT SEED ==="
              docker exec $CONTAINER npx tsx scripts/seed-aisbp-vault.ts
            fi
