# Hostinger VPS Docker deploy + manual VPS from repo root.
# Build context is the monorepo root (`.`). Used by GitHub Action hostinger/deploy-on-vps.
#
#   docker compose -f docker-compose.hostinger.yml --env-file .env.production up -d --build
#
# Backend `env_file: .env.production` injects that file into the container (e.g. GHL_FREE_SLOTS_*).
# Do not add `GHL_FREE_SLOTS_*: ${GHL_FREE_SLOTS_*}` under `environment:` — empty host interpolation
# would override those values. Keep GHL_FREE_SLOTS_* only in `.env.production` or pass them via
# `docker compose --env-file .env.production` for `${...}` substitution on other keys.
#
# Required env (file or shell): DATABASE_URL, SUPABASE_*, JWT_SECRET, ENCRYPTION_KEY,
# CORS_ORIGIN, NEXT_PUBLIC_SUPABASE_* (build args for the frontend image).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - aisbp_redisdata:/data

  backend:
    build:
      context: .
      dockerfile: infra/vps/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    expose:
      - '3001'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: '3001'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WEBHOOK_SIGNATURE_SECRET: ${WEBHOOK_SIGNATURE_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_PREFIX: ${API_PREFIX:-api/v1}
      QUEUE_PREFIX: ${QUEUE_PREFIX:-aisbp}
      ALLOW_INSECURE_DEV_KEY: ${ALLOW_INSECURE_DEV_KEY:-false}
      # Public app origin used in Supabase invite/recovery `redirectTo`. Required in
      # production — backend throws on first invite/reset call if missing or localhost.
      # Must also be allow-listed in Supabase Auth → URL Configuration → Redirect URLs:
      #   {INVITE_APP_BASE_URL}/auth/invite
      #   {INVITE_APP_BASE_URL}/auth/reset-password
      INVITE_APP_BASE_URL: ${INVITE_APP_BASE_URL}

  frontend:
    build:
      context: .
      dockerfile: infra/vps/Dockerfile.frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        BACKEND_DEV_URL: http://backend:3001
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PUBLISH_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      BACKEND_URL: http://backend:3001

volumes:
  aisbp_redisdata:
