# Frontend + API + Redis on a VPS; Postgres & Supabase Auth on hosted Supabase.
# From repo root:
#   docker compose -f infra/vps/docker-compose.yml up -d --build
#
# Set DATABASE_URL to your Supabase project Postgres connection string (Dashboard → Settings → Database).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - aisbp_redisdata:/data

  backend:
    build:
      context: ../..
      dockerfile: infra/vps/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    expose:
      - '3001'
    environment:
      NODE_ENV: production
      PORT: '3001'
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    env_file:
      - .env

  frontend:
    build:
      context: ../..
      dockerfile: infra/vps/Dockerfile.frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        BACKEND_DEV_URL: http://backend:3001
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PUBLISH_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      BACKEND_URL: http://backend:3001
    env_file:
      - .env

volumes:
  aisbp_redisdata:
